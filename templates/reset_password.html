<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS User Portal — Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">☁️ AWS User Portal</div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="btn btn-small">← Dashboard</a>
            <a href="{{ url_for('logout') }}" class="btn btn-small btn-danger">Logout</a>
        </div>
    </nav>

    <div class="main">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <div class="card-inner">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter the username and their new password below.</p>

            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" 
                    placeholder="Enter username to reset" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" 
                    placeholder="Enter new password" required>
                </div>
                <button type="submit" class="btn btn-primary">Reset Password →</button>
            </form>
        </div>
    </div>
</body>
</html>
